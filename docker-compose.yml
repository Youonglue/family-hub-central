services:
  familyhub:
    build:
      context: .
      args:
        - SUPABASE_URL=${SUPABASE_URL}
        - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - familyhub-data:/data

volumes:
  familyhub-data:
